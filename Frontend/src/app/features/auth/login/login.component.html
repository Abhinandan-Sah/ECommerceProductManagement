<div class="min-h-screen flex items-center justify-center p-6 bg-[var(--color-bg)] w-full">
  <div class="ec-card auth-card w-full max-w-md p-8">
    <h2 class="auth-heading text-center mb-6">Sign In</h2>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">
        <!-- Email Field -->
        <div class="form-group">
          <label for="email" class="block text-sm font-medium text-[var(--color-text-primary)] mb-1">Email Address</label>
          <input
            id="email"
            type="email"
            formControlName="email"
            [class.error]="isInvalid('email')"
            class="ec-input"
            placeholder="Enter your email"
            autocomplete="email"
          />
          <span *ngIf="isInvalid('email')" class="text-sm text-[var(--color-danger)] mt-1 block">
            {{ getError('email') }}
          </span>
        </div>

        <!-- Password Field -->
        <div class="form-group">
          <label for="password" class="block text-sm font-medium text-[var(--color-text-primary)] mb-1">Password</label>
          <input
            id="password"
            type="password"
            formControlName="password"
            [class.error]="isInvalid('password')"
            class="ec-input"
            placeholder="Enter your password"
            autocomplete="current-password"
          />
          <span *ngIf="isInvalid('password')" class="text-sm text-[var(--color-danger)] mt-1 block">
            {{ getError('password') }}
          </span>
        </div>

        <!-- Forgot Password Link -->
        <div class="flex justify-end">
          <a routerLink="/forgot-password" class="forgot-link text-sm font-medium">
            Forgot password?
          </a>
        </div>

        <!-- Error Banner -->
        <div *ngIf="error$ | async as error" class="bg-[var(--color-danger)]/10 text-[var(--color-danger)] p-3 rounded-md text-sm flex items-center gap-2">
          <svg class="w-5 h-5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
          </svg>
          <span class="break-words">{{ error }}</span>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          [disabled]="(loading$ | async)"
          class="btn-primary w-full h-11 text-base flex justify-center items-center gap-2"
        >
          <span *ngIf="loading$ | async" class="animate-spin rounded-full h-4 w-4 border-2 border-white border-t-transparent"></span>
          {{ (loading$ | async) ? 'Signing in...' : 'Sign In' }}
        </button>

        <div class="auth-divider my-6"><span>OR</span></div>
        
        <div class="text-center text-sm text-[var(--color-text-secondary)]">
          Don't have an account? 
          <a routerLink="/register" class="font-medium text-[var(--color-primary)] hover:underline">Register</a>
        </div>
      </form>
  </div>
</div>
